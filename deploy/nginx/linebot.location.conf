# Mount the bot under /linebot/ on an existing nginx server { } block.
# Webhook URL to configure in the LINE Developers Console:
#   https://<your-domain>/linebot/callback
#
# Usage:
#   1. Copy this file to /etc/nginx/snippets/linebot.location.conf
#   2. Inside your server { } block, add:
#        include /etc/nginx/snippets/linebot.location.conf;
#   3. sudo nginx -t && sudo systemctl reload nginx

location /linebot/ {
    proxy_pass http://127.0.0.1:5050/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}
